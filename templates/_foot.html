    <div class="controls" id="controls">
      <button class="btn" id="home" aria-label="Go to first slide" title="Go to first slide"><i class="fa-solid fa-house" style="font-size:12px;"></i></button>
      <button class="btn" id="prev" aria-label="Previous slide"><i class="fa-solid fa-chevron-left"></i></button>
      <span class="slide-counter" id="counter">1 / 34</span>
      <button class="btn" id="next" aria-label="Next slide"><i class="fa-solid fa-chevron-right"></i></button>
      <button class="btn" id="fullscreen" aria-label="Toggle fullscreen"><i class="fa-solid fa-expand"></i></button>
    </div>

    <div class="progress-bar" id="progressBar" style="width: 0%;"></div>

    <script>
      const deck = document.getElementById('deck');
      const slides = document.querySelectorAll('.slide');
      const counter = document.getElementById('counter');
      const controls = document.getElementById('controls');
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const homeBtn = document.getElementById('home');
      const fullscreenBtn = document.getElementById('fullscreen');
      const progressBar = document.getElementById('progressBar');
      let currentSlide = 0;
      const savedSlide = parseInt(localStorage.getItem('{{DECK_KEY}}-slide'), 10);
      let controlsTimeout;

      function updateProgress(index) {
        const progress = ((index + 1) / slides.length) * 100;
        progressBar.style.width = progress + '%';
      }

      function showSlide(index) {
        if (index === currentSlide) return;
        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });
        currentSlide = index;
        localStorage.setItem('{{DECK_KEY}}-slide', index);
        counter.textContent = `${index + 1} / ${slides.length}`;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === slides.length - 1;
        updateProgress(index);
      }

      function nextSlide() {
        if (currentSlide < slides.length - 1) showSlide(currentSlide + 1);
      }

      function prevSlide() {
        if (currentSlide > 0) showSlide(currentSlide - 1);
      }

      function scaleDeck() {
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.min(scaleX, scaleY);
        deck.style.transform = `scale(${scale})`;
        const overflowX = Math.max(0, (window.innerWidth / scale - 1920) / 2);
        const overflowY = Math.max(0, (window.innerHeight / scale - 1080) / 2);
        document.documentElement.style.setProperty('--overflow-x', overflowX + 'px');
        document.documentElement.style.setProperty('--overflow-y', overflowY + 'px');
        const stripBase = document.fullscreenElement ? 72 : Math.max(10 / scale, 16);
        document.documentElement.style.setProperty('--strip-base', stripBase + 'px');
      }

      function showControls() {
        controls.classList.add('visible');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
          controls.classList.remove('visible');
        }, 3000);
      }

      prevBtn.addEventListener('click', prevSlide);
      nextBtn.addEventListener('click', nextSlide);
      homeBtn.addEventListener('click', () => showSlide(0));

      fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault();
          nextSlide();
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault();
          prevSlide();
        } else if (e.key === 'f' || e.key === 'F') {
          fullscreenBtn.click();
        }
      });

      // Touch support
      let touchStartX = 0;
      let touchStartY = 0;
      document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
      });
      document.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        const dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
          if (dx < 0) nextSlide();
          else prevSlide();
        }
      });

      document.addEventListener('mousemove', showControls);
      document.addEventListener('click', showControls);

      window.addEventListener('resize', scaleDeck);
      document.addEventListener('fullscreenchange', scaleDeck);
      scaleDeck();
      // Restore last viewed slide on refresh
      const initSlide = (!isNaN(savedSlide) && savedSlide >= 0 && savedSlide < slides.length) ? savedSlide : 0;
      slides.forEach(s => s.classList.remove('active'));
      currentSlide = -1;
      showSlide(initSlide);
      updateProgress(initSlide);
      showControls();

      // Inject corner brackets and architectural lines for C&R slides
      slides.forEach(slide => {
        if (slide.classList.contains('pave')) return;
        const tl = document.createElement('div');
        tl.className = 'bracket tl';
        const br = document.createElement('div');
        br.className = 'bracket br';
        const hz = document.createElement('div');
        hz.className = 'arch-line hz';
        const vt = document.createElement('div');
        vt.className = 'arch-line vt';
        const dg = document.createElement('div');
        dg.className = 'arch-line dg';
        slide.appendChild(tl);
        slide.appendChild(br);
        slide.appendChild(hz);
        slide.appendChild(vt);
        slide.appendChild(dg);
      });

      // Initialize Lucide icons
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }

      // IMAGE ZOOM OVERLAY
      (function() {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center;cursor:zoom-out;';
        overlay.innerHTML = '<img src="" alt="Zoomed image" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;box-shadow:0 0 60px rgba(0,0,0,0.5);" />';
        document.body.appendChild(overlay);
        const overlayImg = overlay.querySelector('img');

        function openZoom(src) {
          overlayImg.src = src;
          overlay.style.display = 'flex';
        }

        function closeZoom() {
          overlay.style.display = 'none';
          overlayImg.src = '';
        }

        overlay.addEventListener('click', closeZoom);

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && overlay.style.display === 'flex') {
            closeZoom();
            e.stopPropagation();
          }
        });

        document.querySelectorAll('.case-image, .case-collage img').forEach(function(img) {
          img.style.cursor = 'zoom-in';
          img.addEventListener('click', function(e) {
            e.stopPropagation();
            openZoom(this.src);
          });
        });
      })();
    </script>

  </body>
</html>
