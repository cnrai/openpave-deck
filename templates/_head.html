<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* =================================================================
         DUAL-THEME DESIGN SYSTEM
         C&R Neo-Brutalist (Light) + PAVE Cobalt (Dark)
         ================================================================= */
      :root {
        /* C&R Light */
        --bg: #FFFFFF; --fg: #111827; --fg-muted: #4B5563;
        --brand-blue: #2459BB; --brand-blue-light: #6A9EF5;
        --brand-blue-dark: #1a4590; --brand-blue-bg: #EEF4FF;
        --accent: #E4FE54; --accent-dark: #c9e24a;
        --muted: #F3F4F6; --muted-dark: #E5E7EB;
        --border: 3px solid #111827; --shadow: 5px 5px 0 #111827;
        --shadow-sm: 3px 3px 0 #111827; --shadow-hover: 2px 2px 0 #111827;
        --radius: 0px; --radius-lg: 0px;
        --font-mono: 'Space Mono', monospace;
        --w: 1920px; --h: 1080px;
        /* PAVE Dark */
        --pave-base: #0a0f1e; --pave-surface: #111827;
        --pave-surface-2: #1e293b; --pave-surface-3: #334155;
        --pave-accent: #c8ff00; --pave-accent-dim: #a3cc00;
        --pave-text: #f8fafc; --pave-text-secondary: #cbd5e1;
        --pave-muted: #94a3b8; --pave-border: #1e293b;
        --pave-font-display: 'Plus Jakarta Sans', sans-serif;
        --pave-font-body: 'Inter', 'Plus Jakarta Sans', sans-serif;
        --pave-font-mono: 'JetBrains Mono', monospace;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; padding: 0; }
      body {
        background: var(--muted); font-family: "Outfit", sans-serif;
        color: var(--fg); overflow: hidden; -webkit-font-smoothing: antialiased;
      }

      /* === STAGE / DECK === */
      .stage {
        width: 100vw; height: 100vh; display: flex; justify-content: center;
        align-items: center; background: var(--bg); overflow: hidden;
        position: fixed; top: 0; left: 0;
      }
      .deck {
        width: var(--w); height: var(--h); transform-origin: center center;
        position: relative; background: var(--bg); flex-shrink: 0; overflow: visible;
      }
      .slide {
        position: absolute;
        inset: calc(-1 * var(--overflow-y, 0px)) calc(-1 * var(--overflow-x, 0px));
        opacity: 0; visibility: hidden;
        transition: opacity 400ms ease, visibility 0ms 400ms;
        z-index: 1; overflow: hidden;
      }
      .slide.active {
        opacity: 1; visibility: visible;
        transition: opacity 400ms ease, visibility 0ms 0ms; z-index: 10;
      }

      /* =================================================================
         C&R LIGHT SLIDE STYLES
         ================================================================= */
      .slide.cnr { background: var(--bg); }
      .slide.cnr::before {
        content: ""; position: absolute; inset: 0;
        background-image: radial-gradient(circle, #D1D5DB 1.2px, transparent 1.2px);
        background-size: 32px 32px; pointer-events: none; z-index: 0; opacity: 0.7;
      }
      .slide.cnr::after {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0;
        width: calc(var(--strip-base, 72px) + var(--overflow-x, 0px));
        background: var(--brand-blue); z-index: 1; pointer-events: none;
      }
      .slide.cnr .chrome {
        position: relative;
        height: calc(140px + var(--overflow-y, 0px));
        padding: 48px 80px 0 120px;
        padding-top: calc(48px + var(--overflow-y, 0px));
        padding-left: calc(120px + var(--overflow-x, 0px));
        padding-right: calc(80px + var(--overflow-x, 0px));
        display: flex; justify-content: space-between; align-items: flex-start;
        z-index: 20; border-bottom: 6px solid var(--brand-blue);
      }
      .brand-rail { display: flex; align-items: center; gap: 24px; }
      .logo { height: 48px; width: auto; }
      .pill {
        font-family: var(--font-mono); font-size: 15px; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg);
        background: var(--accent); padding: 10px 18px; border-radius: var(--radius); border: var(--border);
      }
      .slide-meta { display: flex; align-items: center; gap: 20px; }
      .slide.cnr .content {
        position: relative;
        height: calc(var(--h) - 140px + var(--overflow-y, 0px));
        padding: 20px 100px 80px 120px;
        padding-left: calc(120px + var(--overflow-x, 0px));
        padding-right: calc(100px + var(--overflow-x, 0px));
        padding-bottom: calc(80px + var(--overflow-y, 0px));
        display: flex; flex-direction: column; gap: 36px; z-index: 20; justify-content: center;
        overflow: hidden;
      }
      .slide.cnr.center .content {
        justify-content: center; text-align: center; align-items: center; padding-bottom: 140px;
      }

      /* C&R Typography */
      h1, h2, h3, h4 { margin: 0; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
      h1 { font-size: 120px; color: var(--brand-blue); }
      h2 { font-size: 72px; color: var(--fg); }
      h3 { font-size: 36px; font-weight: 700; color: var(--brand-blue); margin-bottom: 16px; }
      h4 { font-size: 28px; font-weight: 700; color: var(--brand-blue); }
      p { margin: 0; font-size: 26px; line-height: 1.5; font-weight: 400; color: var(--fg-muted); }
      .kicker {
        display: inline-flex; align-items: center; gap: 16px;
        font-family: var(--font-mono); font-size: 18px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.15em; color: var(--brand-blue); margin-bottom: 20px;
      }
      .kicker::before { content: ""; width: 48px; height: 6px; background: var(--accent); }
      .tagline { font-size: 36px; font-weight: 400; color: var(--fg-muted); font-family: var(--font-mono); }

      /* C&R Components */
      .flat-icon {
        width: 48px; height: 48px; border-radius: var(--radius);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 20px; flex-shrink: 0; border: var(--border);
      }
      .flat-icon.blue { background: var(--brand-blue); color: white; }
      .flat-icon.accent { background: var(--accent); color: var(--fg); }
      .flat-icon.muted { background: var(--muted-dark); color: var(--fg); }
      .flat-icon.light { background: var(--brand-blue-bg); color: var(--brand-blue); }
      .flat-icon-lg {
        width: 64px; height: 64px; border-radius: var(--radius-lg);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 28px; flex-shrink: 0; border: var(--border);
      }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
      .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
      .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
      .grid5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
      .grid6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; }
      .card {
        background: var(--bg); border: var(--border); border-radius: var(--radius-lg);
        padding: 40px; box-shadow: var(--shadow);
        transition: box-shadow 200ms ease-out, transform 200ms ease-out;
      }
      .card:hover { box-shadow: var(--shadow-hover); transform: translate(3px, 3px); }
      .card.highlight { background: var(--brand-blue-bg); }
      .feature-card {
        background: var(--bg); border-radius: var(--radius-lg); padding: 32px;
        border: var(--border); box-shadow: var(--shadow);
        transition: box-shadow 200ms ease-out, transform 200ms ease-out;
      }
      .feature-card:hover { box-shadow: var(--shadow-hover); transform: translate(3px, 3px); }
      .feature-card h4 { margin-bottom: 12px; }
      .feature-card p { font-size: 20px; }
      .feature-row {
        display: flex; align-items: flex-start; gap: 20px; background: var(--bg);
        padding: 24px 32px; border-radius: var(--radius-lg);
        border: var(--border); border-left: 6px solid var(--brand-blue); box-shadow: var(--shadow);
      }
      .feature-row.accent { border-left-color: var(--accent); }
      .stat-box {
        background: var(--brand-blue); color: white; border-radius: var(--radius-lg);
        padding: 28px; text-align: center; border: var(--border); box-shadow: var(--shadow);
        transition: box-shadow 200ms ease-out, transform 200ms ease-out;
      }
      .stat-box:hover { box-shadow: var(--shadow-hover); transform: translate(3px, 3px); }
      .stat-box .stat-value { font-size: 56px; font-weight: 800; display: block; margin-bottom: 6px; }
      .stat-box .stat-label { font-family: var(--font-mono); font-size: 16px; font-weight: 400; opacity: 0.9; }
      .stat-box.accent { background: var(--accent); color: var(--fg); }
      .stat-box.light { background: var(--bg); color: var(--brand-blue); }
      .title-meta { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
      .meta-tag {
        background: var(--bg); border: var(--border); padding: 14px 24px;
        border-radius: var(--radius); font-family: var(--font-mono);
        font-size: 18px; font-weight: 700; color: var(--fg); box-shadow: var(--shadow-sm);
      }
      .meta-tag strong { color: var(--fg); }
      ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 16px; }
      li { font-size: 28px; color: var(--fg); padding-left: 28px; position: relative; line-height: 1.45; }
      li::before {
        content: ""; position: absolute; left: 0; top: 14px;
        width: 10px; height: 10px; border-radius: 0; background: var(--brand-blue);
      }
      strong { color: var(--brand-blue); font-weight: 700; }

      /* C&R Title slide */
      .slide.cnr.title-slide { background: var(--brand-blue); }
      .slide.cnr.title-slide::before {
        background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 32px 32px; opacity: 1;
      }
      .slide.cnr.title-slide::after { background: var(--accent); opacity: 1; }
      .slide.cnr.title-slide h1 { color: white; font-size: 110px; }
      .slide.cnr.title-slide h1 em { font-style: normal; color: var(--accent); }
      .slide.cnr.title-slide .tagline { color: rgba(255,255,255,0.85); }
      .slide.cnr.title-slide .chrome { border-bottom-color: rgba(255,255,255,0.2); }
      .slide.cnr.title-slide .logo { filter: brightness(0) invert(1); }
      .slide.cnr.title-slide .meta-tag {
        background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.5);
        color: white; box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      }
      .slide.cnr.title-slide .meta-tag strong { color: white; }
      .slide.cnr.title-slide .client-logo-badge {
        height: 40px; object-fit: contain; margin-left: 16px; filter: brightness(0) invert(1); opacity: 0.9;
      }

      /* Two-col and case study */
      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
      .case-content { display: flex; flex-direction: column; gap: 24px; }
      .case-content h2 { font-size: 56px; line-height: 1.15; }
      .case-meta { display: flex; gap: 12px; flex-wrap: wrap; }
      .case-tag {
        background: var(--accent); color: var(--fg); padding: 8px 16px;
        border-radius: var(--radius); font-family: var(--font-mono);
        font-size: 14px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; border: var(--border);
      }
      .hero-stat {
        font-size: 110px; font-weight: 800; color: var(--brand-blue);
        line-height: 1; letter-spacing: -0.03em; margin-top: 8px;
      }
      .hero-stat-label {
        font-family: var(--font-mono); font-size: 22px; font-weight: 700;
        color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.1em;
        margin-top: 4px; margin-bottom: 8px;
      }
      .case-image {
        width: 100%; height: auto; border-radius: var(--radius-lg);
        border: var(--border); box-shadow: var(--shadow);
      }
      .case-collage { display: flex; flex-direction: column; gap: 6px; max-height: 100%; align-self: start; }
      .case-collage .collage-row { display: flex; gap: 6px; }
      .case-collage img { width: 100%; height: auto; object-fit: cover; }
      .case-collage .collage-row img { flex: 1; min-width: 0; }

      /* Client grid */
      .client-grid {
        display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(3, 1fr);
        position: absolute; top: calc(140px + var(--overflow-y, 0px));
        left: calc(var(--strip-base, 72px) + var(--overflow-x, 0px)); right: 0; bottom: 0; z-index: 20;
      }
      .client-cell { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
      .client-cell.blue { background: var(--brand-blue); }
      .client-cell.accent { background: var(--accent); }
      .client-cell.white { background: var(--bg); }
      .client-cell img.client-logo { max-width: 70%; max-height: 60%; object-fit: contain; }
      .client-cell img.client-logo.invert-white { filter: brightness(0) invert(1); }
      .client-cell span { font-family: var(--font-mono); font-size: 15px; font-weight: 700; text-align: center; line-height: 1.3; }
      .client-cell.blue span { color: white; }
      .client-cell.accent span { color: var(--fg); }
      .client-cell.white span { color: var(--fg); }
      .client-cell.text-block {
        grid-column: span 2; grid-row: span 2;
        flex-direction: column; align-items: flex-start; padding: 40px; gap: 16px;
      }
      .client-cell.text-block h2 { font-size: 42px; color: var(--fg); line-height: 1.1; }
      .client-cell.text-block p { font-size: 16px; line-height: 1.5; color: var(--fg-muted); }

      /* =================================================================
         PAVE DARK SLIDE STYLES
         ================================================================= */
      .slide.pave {
        background: var(--pave-base); color: var(--pave-text);
        font-family: var(--pave-font-body);
      }
      .slide.pave::before, .slide.pave::after { display: none; }

      /* PAVE layout */
      .slide.pave .pave-chrome {
        position: relative; z-index: 20;
        display: flex; align-items: center; justify-content: space-between;
        padding: 32px 64px 0; margin-bottom: 40px; flex-shrink: 0;
      }
      .slide.pave .pave-chrome img { height: 44px; object-fit: contain; }
      .slide.pave .pave-chrome img.pave-logo { filter: none; }
      .slide.pave.pave-accent-bg .pave-chrome img.pave-logo { filter: none; }
      .slide.pave .pave-chrome .pave-client-tag {
        height: 44px; opacity: 0.85;
        padding: 0; display: flex; align-items: center;
      }
      .slide.pave .pave-chrome .pave-client-tag img {
        height: 36px; object-fit: contain;
      }
      .slide.pave.pave-accent-bg .pave-chrome .pave-client-tag img {
        filter: brightness(0); opacity: 0.8;
      }
      .slide.pave .pave-content {
        position: relative; z-index: 20; flex: 1;
        display: flex; flex-direction: column; padding: 0 64px 64px; gap: 24px;
      }

      /* PAVE Typography */
      .slide.pave .p-display { font-family: var(--pave-font-display); font-weight: 800; font-size: 64px; line-height: 1.08; letter-spacing: -0.02em; color: var(--pave-text); }
      .slide.pave .p-headline { font-family: var(--pave-font-display); font-weight: 700; font-size: 56px; line-height: 1.12; letter-spacing: -0.02em; color: var(--pave-text); }
      .slide.pave .p-title { font-family: var(--pave-font-display); font-weight: 700; font-size: 48px; line-height: 1.15; letter-spacing: -0.01em; color: var(--pave-text); }
      .slide.pave .p-subtitle { font-family: var(--pave-font-display); font-weight: 600; font-size: 28px; line-height: 1.3; color: var(--pave-text); }
      .slide.pave .p-body-large { font-size: 26px; line-height: 1.5; color: var(--pave-text-secondary); }
      .slide.pave .p-body { font-size: 21px; line-height: 1.5; color: var(--pave-text-secondary); }
      .slide.pave .p-label { font-family: var(--pave-font-mono); font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--pave-accent); font-weight: 600; }
      .slide.pave .p-caption { font-family: var(--pave-font-mono); font-size: 15px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--pave-muted); }
      .slide.pave .accent-text { color: var(--pave-accent); }
      .slide.pave .muted-text { color: var(--pave-muted); }

      /* PAVE Components */
      .slide.pave .p-card {
        background: var(--pave-surface); border: 1px solid var(--pave-border); border-radius: 16px; padding: 32px;
      }
      .slide.pave .p-icon-circle {
        width: 56px; height: 56px; border-radius: 14px;
        background: rgba(200, 255, 0, 0.1);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px; flex-shrink: 0;
      }
      .slide.pave .p-icon-circle i { color: var(--pave-accent); width: 28px; height: 28px; }
      .slide.pave .p-metric-value {
        font-family: var(--pave-font-display); font-weight: 800;
        font-size: 60px; color: var(--pave-accent); line-height: 1; margin-bottom: 8px;
      }
      .slide.pave .p-tag {
        display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 6px;
        font-family: var(--pave-font-mono); font-size: 13px;
        letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600;
      }
      .slide.pave .p-tag.lime { background: rgba(200,255,0,0.15); color: var(--pave-accent); }
      .slide.pave .p-tag.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
      .slide.pave .p-tag.green { background: rgba(34,197,94,0.15); color: #4ade80; }

      .slide.pave .p-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .slide.pave .p-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
      .slide.pave .p-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 24px; }
      .slide.pave .p-grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 20px; }
      .slide.pave .brand-bar {
        position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
        background: linear-gradient(90deg, var(--pave-accent), #00d4ff, var(--pave-accent));
      }
      .slide.pave .slide-number {
        position: absolute; bottom: 20px; right: 64px;
        font-family: var(--pave-font-mono); font-size: 14px;
        color: var(--pave-muted); z-index: 5; font-weight: 500;
      }
      .slide.pave .check-item {
        display: flex; align-items: center; gap: 14px;
        font-size: 21px; font-weight: 500; color: var(--pave-text);
      }
      .slide.pave .check-item i { color: var(--pave-accent); flex-shrink: 0; }

      /* PAVE Theme Variants */
      .slide.pave.pave-gradient {
        background: linear-gradient(135deg, var(--pave-base) 0%, #1a1040 50%, var(--pave-base) 100%);
      }
      .slide.pave.pave-surface { background: var(--pave-surface); }
      .slide.pave.pave-accent-bg { background: var(--pave-accent); color: var(--pave-base); }

      /* PAVE Full-bleed background images */
      .slide.pave .pave-bg-image {
        position: absolute; inset: 0; z-index: 0;
        background-size: cover; background-position: center;
        opacity: 0.45;
      }
      .slide.pave .pave-bg-image::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(10,15,30,0.7) 0%, rgba(10,15,30,0.3) 40%, rgba(10,15,30,0.3) 60%, rgba(10,15,30,0.7) 100%);
      }
      .slide.pave.pave-gradient .pave-bg-image::after {
        background: linear-gradient(180deg, rgba(10,15,30,0.6) 0%, rgba(26,16,64,0.25) 40%, rgba(26,16,64,0.25) 60%, rgba(10,15,30,0.6) 100%);
      }
      .slide.pave .pave-bg-image + .pave-chrome,
      .slide.pave .pave-bg-image ~ .pave-content,
      .slide.pave .pave-bg-image ~ .pave-divider,
      .slide.pave .pave-bg-image ~ div { position: relative; z-index: 1; }
      .slide.pave.pave-accent-bg .p-display,
      .slide.pave.pave-accent-bg .p-headline,
      .slide.pave.pave-accent-bg .p-title,
      .slide.pave.pave-accent-bg .p-subtitle,
      .slide.pave.pave-accent-bg .p-body-large,
      .slide.pave.pave-accent-bg .p-body { color: var(--pave-base); }
      .slide.pave.pave-accent-bg .p-label { color: var(--pave-base); opacity: 0.6; }
      .slide.pave.pave-accent-bg .muted-text { color: rgba(10,15,30,0.6); }
      .slide.pave.pave-accent-bg .brand-bar { background: var(--pave-base); }

      /* PAVE Split layout */
      .slide.pave .pave-split {
        display: grid; grid-template-columns: 1fr 1fr; gap: 0;
        flex: 1; overflow: hidden;
      }
      .slide.pave .pave-split-left {
        padding: 0 48px 64px 64px; display: flex; flex-direction: column; justify-content: center; gap: 24px;
      }
      .slide.pave .pave-split-right {
        display: flex; align-items: center; justify-content: center; padding: 32px;
      }

      /* PAVE Divider — centered text */
      .slide.pave .pave-divider {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; text-align: center; max-width: 800px; margin: 0 auto;
      }

      /* PAVE Compare columns */
      .slide.pave .compare-col {
        flex: 1; padding: 32px; border-radius: 16px;
      }
      .slide.pave .compare-col.before {
